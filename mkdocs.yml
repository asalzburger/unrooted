site_name: unrooted
site_description: Read, manipulate and visualise histograms from physics data formats — without ROOT
site_url: https://asalzburger.github.io/unrooted
repo_url: https://github.com/asalzburger/unrooted
repo_name: asalzburger/unrooted
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/logo_b_icon.svg
  favicon: assets/logo_b_icon.svg
  palette:
    - scheme: default
      primary: custom
      accent: custom
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight

extra_css:
  - stylesheets/extra.css

hooks:
  - docs/hooks.py

exclude_docs: |
  hooks.py
  __pycache__/

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            heading_level: 2
            members_order: source
            docstring_style: google

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.snippets:
      base_path: docs
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md
  - User Guide:
    - Loading ROOT Data: user-guide/loading-root.md
    - Histograms & Axes: user-guide/histograms.md
    - Plotting: user-guide/plotting.md
    - Styles & Themes: user-guide/styling.md
    - Command-line interface: user-guide/cli.md
    - Resources: user-guide/resources.md
    - Examples: user-guide/examples.md
  - API Reference:
    - Core: api/core.md
    - I/O: api/io.md
    - Plot: api/plot.md

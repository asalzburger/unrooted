<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 185">
  <!-- Logo B with wordmark: u-monogram + "unrooted" text -->

  <!-- U-connecting curve -->
  <path d="M 29,112 C 29,152 111,152 111,112"
        fill="none" stroke="#1A4F8A" stroke-width="38" stroke-linecap="butt"/>

  <!-- Left bar – deep navy (taller) -->
  <rect x="10" y="10" width="38" height="102" rx="2" fill="#1A4F8A"/>

  <!-- Right bar – warm amber (shorter) -->
  <rect x="92" y="33" width="38" height="79"  rx="2" fill="#E8921A"/>

  <!-- Thin baseline -->
  <line x1="2" y1="116" x2="138" y2="116" stroke="#C8CDD0" stroke-width="1"/>

  <!-- "unrooted" wordmark -->
  <text x="70" y="180"
        text-anchor="middle"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="15" font-weight="300" letter-spacing="3"
        fill="#1A4F8A">unrooted</text>
</svg>
